spring:
  application:
        name: sgilt-core

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/sgilt}
    username: ${DB_USERNAME:sgilt}
    password: ${DB_PASSWORD:sgilt}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    out-of-order: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER:http://localhost:5028/realms/sgilt}

  servlet:
    multipart:
      max-file-size: ${MAX_UPLOAD_SIZE_MB:10}MB
      max-request-size: ${MAX_UPLOAD_SIZE_MB:10}MB

sgilt:
  r2:
    endpoint: ${R2_ENDPOINT:http://localhost:5029}
    access-key-id: ${R2_ACCESS_KEY_ID:mock-key}
    secret-access-key: ${R2_SECRET_ACCESS_KEY:mock-secret}
    bucket: ${R2_BUCKET:sgilt-media}
    documents-bucket: ${R2_DOCUMENTS_BUCKET:sgilt-documents}
  jwt:
    confirmation-secret: ${CONFIRMATION_TOKEN_SECRET}
    confirmation-expiration-hours: 24
  mailer:
    url: ${MAILER_URL:http://localhost:5030}
  frontend:
    url: ${PUBLIC_SITE_URL:http://localhost:3000}
  keycloak:
    admin-url: ${KC_ADMIN_URL:http://localhost:5028}
    realm: sgilt
    admin-client-id: sgilt-admin
    admin-client-secret: ${KC_ADMIN_CLIENT_SECRET}
    front-client-id: sgilt-front
    magic-link-secret: ${MAGIC_LINK_SECRET:dev-magic-secret-change-in-prod}

server:
  port: 5027