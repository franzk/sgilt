spring:
  application:
        name: sgilt-core

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/sgilt}
    username: ${DB_USERNAME:sgilt}
    password: ${DB_PASSWORD:sgilt}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER:http://host.docker.internal:5028/realms/sgilt}

sgilt:
  jwt:
    confirmation-secret: ${CONFIRMATION_TOKEN_SECRET:c2dpbHQtZGV2LWNvbmZpcm1hdGlvbi10b2tlbi1zZWNyZXQta2V5LWNoYW5nZS1pbi1wcm9kdWN0aW9u}
    confirmation-expiration-hours: 24

server:
  port: 5027