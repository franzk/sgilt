spring:
  application:
    name: sgilt-notifications

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/sgilt}
    username: ${DB_USERNAME:sgilt}
    password: ${DB_PASSWORD:sgilt}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: sgilt-notifications

  flyway:
    enabled: true
    locations: classpath:db/migration
    out-of-order: true
    # Isole sgilt-sgilt-notifications dans son propre schéma au sein de la base partagée avec
    # sgilt-core — Flyway crée le schéma tout seul (create-schemas, activé par défaut)
    schemas: sgilt-notifications
    create-schemas: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER:http://localhost:5028/realms/sgilt}

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    listener:
      simple:
        default-requeue-rejected: false
        retry:
          enabled: true
          initial-interval: 1s
          multiplier: 2
          max-interval: 10s
          max-retries: 3

sgilt:
  frontend:
    url: ${PUBLIC_SITE_URL:http://localhost:3000}

server:
  port: 5031
