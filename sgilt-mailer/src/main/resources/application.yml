spring:
  application:
    name: sgilt-mailer

  mail:
    host: ${SMTP_HOST:localhost} # mailhog default
    port: ${SMTP_PORT:1026}
    username: ${SMTP_USERNAME:sgilt}
    password: ${SMTP_PASSWORD}
    properties:
      mail.smtp.auth: ${SMTP_AUTH:false}
      mail.smtp.ssl.enable: ${SMTP_SSL:false}

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    listener:
      simple:
        default-requeue-rejected: false
        retry:
          enabled: true
          initial-interval: 1s
          multiplier: 2
          max-interval: 10s
          max-retries: 3

server:
  port: 5030