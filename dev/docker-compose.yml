services:
  sgilt-keycloak-db:
    image: postgres:17
    container_name: sgilt-keycloak-db
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    volumes:
      - keycloak_pgdata:/var/lib/postgresql/data
    networks:
      - sgilt-dev-net

  sgilt-keycloak:
    image: quay.io/keycloak/keycloak:26.2.2
    container_name: sgilt-keycloak
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://sgilt-keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      MAGIC_LINK_SECRET: ${MAGIC_LINK_SECRET:-dev-magic-secret-change-in-prod}
    ports:
      - "127.0.0.1:5028:8080"
    depends_on:
      - sgilt-keycloak-db
    volumes:
      - ../sgilt-keycloak/realm:/opt/keycloak/data/import
      - ../sgilt-keycloak/theme:/opt/keycloak/themes/sgilt-theme
      - ../sgilt-keycloak/spi/target/sgilt-keycloak-spi-1.0.0.jar:/opt/keycloak/providers/sgilt-keycloak-spi-1.0.0.jar
    networks:
      - sgilt-dev-net

  sgilt-smtp-bridge:
    image: sgilt-smtp-bridge
    container_name: sgilt-smtp-bridge
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
    build:
      context: ../sgilt-smtp-bridge
    depends_on:
      - rabbitmq
    networks:
      - sgilt-dev-net

  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: sgilt-rabbitmq
    ports:
      - "5672:5672"   # AMQP, for sgilt-core/sgilt-mailer run via bootRun on the host
      - "15672:15672" # Management UI
    networks:
      - sgilt-dev-net

  sgilt-mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: sgilt-mailhog
    ports:
      - "1026:1025" # SMTP
      - "5125:8025" # Web UI

  sgilt-db:
    image: postgres:17
    container_name: sgilt-db
    environment:
      POSTGRES_DB: sgilt
      POSTGRES_USER: sgilt
      POSTGRES_PASSWORD: sgilt
    ports:
      - "5432:5432"
    volumes:
      - sgilt_pgdata:/var/lib/postgresql/data
    networks:
      - sgilt-dev-net

  sgilt-r2-mock:
    image: sgilt-r2-mock
    container_name: sgilt-r2-mock
    build:
      context: ../sgilt-r2-mock
    ports:
      - "5029:5029"
    environment:
      PORT: 5029
      STORAGE_DIR: /app/storage
      DB_PATH: /app/data/mock.db
    volumes:
      - ../sgilt-r2-mock/storage:/app/storage
      - r2_mock_db:/app/data
    networks:
      - sgilt-dev-net

networks:
  sgilt-dev-net:
    driver: bridge

volumes:
  core_pgdata:
  keycloak_pgdata:
  sgilt_pgdata:
  r2_mock_db:
