# docker-compose.back.yml

services:
  # =====================
  # SGILT-CORE DB (Postgres)
  # =====================
  sgilt-core-db:
    image: postgres:17
    container_name: sgilt-core-db-${ENV}
    environment:
      POSTGRES_DB: sgilt-core
      POSTGRES_USER: sgilt-core
      POSTGRES_PASSWORD: ${CORE_DB_PASSWORD}
    volumes:
      - sgilt_core_pgdata:/var/lib/postgresql/data
    networks:
      - sgilt-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sgilt-core -d sgilt-core"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =====================
  # SGILT-CORE (Spring Boot)
  # =====================
  sgilt-core:
    image: ghcr.io/franzk/sgilt/sgilt-core:${SGILT_CORE_VERSION}
    container_name: sgilt-core-${ENV}
    pull_policy: always
    environment:
      SPRING_PROFILES_ACTIVE: ${ENV}
      DB_URL: jdbc:postgresql://sgilt-core-db-${ENV}:5432/sgilt-core
      DB_USERNAME: sgilt-core
      DB_PASSWORD: ${CORE_DB_PASSWORD}
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER}
      CONFIRMATION_TOKEN_SECRET: ${CONFIRMATION_TOKEN_SECRET}
      SPRING_RABBITMQ_HOST: rabbitmq-${ENV}
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      MAILER_FROM: ${MAILER_FROM}
      PUBLIC_SITE_URL: ${PUBLIC_SITE_URL}
      KC_ADMIN_URL: ${KC_ADMIN_URL}
      KC_ADMIN_CLIENT_SECRET: ${KC_ADMIN_CLIENT_SECRET}
      MAGIC_LINK_SECRET: ${MAGIC_LINK_SECRET}
      R2_ENDPOINT: ${R2_ENDPOINT}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET: ${R2_BUCKET}
      R2_DOCUMENTS_BUCKET: ${R2_DOCUMENTS_BUCKET}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB}
    depends_on:
      sgilt-core-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - sgilt-network
    restart: unless-stopped

  # =====================
  # SGILT-GATEWAY (Spring Boot)
  # =====================
  sgilt-gateway:
    image: ghcr.io/franzk/sgilt/sgilt-gateway:${SGILT_GATEWAY_VERSION}
    container_name: sgilt-gateway-${ENV}
    pull_policy: always
    environment:
      BACK_URL: http://sgilt-core-${ENV}:5027
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER}
      APP_URL: ${APP_URL}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB}
    depends_on:
      - sgilt-core
    networks:
      - sgilt-network
    restart: unless-stopped

  # =====================
  # NGINX API
  # =====================
  nginx-api:
    image: nginx:alpine
    container_name: nginx-api-${ENV}
    ports:
      - "${NGINX_API_PORT}:443"
    volumes:
      - ./nginx/api.conf.template:/etc/nginx/templates/default.conf.template:ro
      - /etc/ssl/sgilt:/etc/ssl/sgilt:ro
    environment:
      API_DOMAIN: ${API_DOMAIN}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB}
    depends_on:
      - sgilt-gateway
    networks:
      - sgilt-network
    restart: unless-stopped

  # =====================
  # SGILT-MAILER (Spring Boot)
  # =====================
  sgilt-mailer:
    image: ghcr.io/franzk/sgilt/sgilt-mailer:${SGILT_MAILER_VERSION}
    container_name: sgilt-mailer-${ENV}
    pull_policy: always
    environment:
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_AUTH: ${SMTP_AUTH}
      SMTP_SSL: ${SMTP_SSL}
      SPRING_RABBITMQ_HOST: rabbitmq-${ENV}
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - sgilt-network
    restart: unless-stopped

  # =====================
  # SGILT-SMTP-BRIDGE (Node.js)
  # =====================
  sgilt-smtp-bridge:
    image: ghcr.io/franzk/sgilt/sgilt-smtp-bridge:${SGILT_SMTP_BRIDGE_VERSION}
    container_name: sgilt-smtp-bridge-${ENV}
    pull_policy: always
    environment:
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq-${ENV}:5672
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - sgilt-network
    restart: unless-stopped

  # =====================
  # RABBITMQ
  # =====================
  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: rabbitmq-${ENV}
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - sgilt-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  sgilt_core_pgdata:
    name: sgilt_core_pgdata_${ENV}
  rabbitmq_data:
    name: rabbitmq_data_${ENV}

networks:
  sgilt-network:
    name: sgilt-network-${ENV}
