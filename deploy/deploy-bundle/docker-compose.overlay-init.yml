services:
  sgilt-keycloak:
    # Import realm at startup — in KC 26 production mode, KC exits after the import.
    # Phase 2 of the deploy script waits for the realm in the database, then
    # restarts KC without this flag so it stays running.
    command: ["start", "--http-enabled=true", "--proxy-headers=xforwarded", "--import-realm", "--log-level=org.keycloak.exportimport:DEBUG,org.keycloak.services:DEBUG"]
