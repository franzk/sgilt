services:
  sgilt-keycloak:
    # Import realm then start — in KC 26 production mode, --import-realm exits after import.
    # We chain both commands so KC stays running after the import.
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        /opt/keycloak/bin/kc.sh import --dir /opt/keycloak/data/import
        /opt/keycloak/bin/kc.sh start --http-enabled=true --proxy-headers=xforwarded
