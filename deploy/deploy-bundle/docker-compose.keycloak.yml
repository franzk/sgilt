# docker-compose.keycloak.yml

services:
  # =====================
  # KEYCLOAK DB (Postgres)
  # =====================
  sgilt-keycloak-db:
    image: postgres:17
    container_name: sgilt-keycloak-db-${ENV}
    environment:
      POSTGRES_DB: sgilt-keycloak
      POSTGRES_USER: sgilt-keycloak
      POSTGRES_PASSWORD: ${KC_DB_PASSWORD}
    volumes:
      - sgilt_keycloak_pgdata:/var/lib/postgresql/data
    networks:
      - sgilt-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sgilt-keycloak -d sgilt-keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =====================
  # KEYCLOAK
  # =====================
  sgilt-keycloak:
    image: ghcr.io/franzk/sgilt/sgilt-keycloak:${SGILT_KEYCLOAK_VERSION}
    container_name: sgilt-keycloak-${ENV}
    pull_policy: always
    command: ["start", "--http-enabled=true", "--proxy-headers=xforwarded"]
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://sgilt-keycloak-db-${ENV}:5432/sgilt-keycloak
      KC_DB_USERNAME: sgilt-keycloak
      KC_DB_PASSWORD: ${KC_DB_PASSWORD}
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_BOOTSTRAP_ADMIN_USERNAME}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_BOOTSTRAP_ADMIN_PASSWORD}
      KC_HOSTNAME: ${AUTH_URL}
      KC_HOSTNAME_ADMIN: ${AUTH_URL}
    depends_on:
      sgilt-keycloak-db:
        condition: service_healthy
    networks:
      - sgilt-network
    restart: unless-stopped

  # =====================
  # NGINX AUTH
  # =====================
  nginx-auth:
    image: nginx:alpine
    container_name: nginx-auth-${ENV}
    ports:
      - "${NGINX_AUTH_PORT}:443"
    volumes:
      - ./nginx/auth.conf.template:/etc/nginx/templates/default.conf.template:ro
      - /etc/ssl/sgilt:/etc/ssl/sgilt:ro
    environment:
      AUTH_DOMAIN: ${AUTH_DOMAIN}
    depends_on:
      - sgilt-keycloak
    networks:
      - sgilt-network
    restart: unless-stopped

networks:
  sgilt-network:
    name: sgilt-network-${ENV}