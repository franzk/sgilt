server:
  port: 5080

spring:
  application:
    name: sgilt-gateway
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: onboarding-public
              uri: ${BACK_URL:http://localhost:5027}
              predicates:
                - Path=/api/v1/onboarding/**

            - id: confirmation-public
              uri: ${BACK_URL:http://localhost:5027}
              predicates:
                - Path=/api/v1/confirmation

            - id: prestataires-public
              uri: ${BACK_URL:http://localhost:5027}
              predicates:
                - Path=/api/v1/prestataires/**

            - id: users-private
              uri: ${BACK_URL:http://localhost:5027}
              predicates:
                - Path=/api/v1/users/**

            - id: events-private
              uri: ${BACK_URL:http://localhost:5027}
              predicates:
                - Path=/api/v1/events/**

            - id: reservations-private
              uri: ${BACK_URL:http://localhost:5027}
              predicates:
                - Path=/api/v1/reservations/**

            - id: pro-private
              uri: ${BACK_URL:http://localhost:5027}
              predicates:
                - Path=/api/v1/pro/**

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER:http://localhost:5028/realms/sgilt}
